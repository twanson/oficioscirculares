<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </radialGradient>
  </defs>

  <!-- Dark background matching PDF -->
  <rect width="800" height="450" fill="#232323"/>
  <rect width="800" height="450" fill="url(#glow)" opacity="0.5"/>

  <!-- Thin border inset like PDF -->
  <rect x="20" y="12" width="760" height="426" rx="0" fill="none" stroke="#444" stroke-width="0.5" opacity="0.5"/>

  <!-- OC Logo (real PNG) -->
  <image href="oc-logo-dark.png" x="362" y="28" width="76" height="76"/>

  <!-- Main title — centered, multi-line -->
  <text x="400" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" fill="#F0EBE0" text-anchor="middle">Guía práctica para posicionar</text>
  <text x="400" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" fill="#F0EBE0" text-anchor="middle">tu artesanía como</text>
  <text x="400" y="259" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" fill="#F0EBE0" text-anchor="middle">producto de
    <tspan font-style="italic" fill="#C9A84C">lujo</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">6 claves + ejercicios prácticos para comunicar</text>
  <text x="400" y="318" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">y cobrar el valor real de lo que creas</text>

  <!-- URL at bottom -->
  <text x="400" y="400" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">oficioscirculares.com</text>
</svg>
