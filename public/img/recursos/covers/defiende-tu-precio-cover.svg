<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Defiende tu precio sin pedir perdón — Kit de bolsillo de Oficios Circulares">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F4B3F"/>
      <stop offset="1" stop-color="#2D5F4F"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D17B49"/>
      <stop offset="1" stop-color="#E8956A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- subtle texture lines -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2">
    <path d="M0 220 H1200"/><path d="M0 680 H1200"/>
  </g>

  <!-- price tag motif -->
  <g transform="translate(900 150) rotate(12)">
    <path d="M0 0 L150 0 L260 110 L150 220 L0 220 Z" fill="url(#tag)"/>
    <circle cx="48" cy="48" r="20" fill="#1F4B3F"/>
  </g>

  <!-- eyebrow -->
  <text x="100" y="300" font-family="Inter, system-ui, sans-serif" font-size="28" letter-spacing="4" font-weight="600" fill="#E8956A">KIT DE BOLSILLO · OFICIOS CIRCULARES</text>

  <!-- title -->
  <text x="100" y="400" font-family="Lora, Georgia, serif" font-size="92" font-weight="600" fill="#FAFAF8">Defiende tu precio</text>
  <text x="100" y="500" font-family="Lora, Georgia, serif" font-size="92" font-weight="600" fill="#FAFAF8">sin pedir <tspan font-style="italic" fill="#E8956A">perdón</tspan></text>

  <!-- subtitle -->
  <text x="100" y="585" font-family="Inter, system-ui, sans-serif" font-size="34" fill="#D8E0D2">Calcula tu precio justo, responde a cualquier</text>
  <text x="100" y="630" font-family="Inter, system-ui, sans-serif" font-size="34" fill="#D8E0D2">«es muy caro» y comunica tu valor en cada canal.</text>

  <!-- chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600">
    <rect x="100" y="720" width="300" height="64" rx="32" fill="#ffffff" fill-opacity="0.10"/>
    <text x="250" y="761" text-anchor="middle" fill="#FAFAF8">8 objeciones + respuesta</text>
    <rect x="420" y="720" width="290" height="64" rx="32" fill="#ffffff" fill-opacity="0.10"/>
    <text x="565" y="761" text-anchor="middle" fill="#FAFAF8">Guion coste por uso</text>
    <rect x="730" y="720" width="240" height="64" rx="32" fill="#ffffff" fill-opacity="0.10"/>
    <text x="850" y="761" text-anchor="middle" fill="#FAFAF8">Munición de datos</text>
  </g>
</svg>
