<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="75%">
      <stop offset="0%" style="stop-color:#0c4a3a"/>
      <stop offset="55%" style="stop-color:#023429"/>
      <stop offset="100%" style="stop-color:#011f17"/>
    </radialGradient>
    <linearGradient id="ocreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C17134"/>
      <stop offset="50%" style="stop-color:#FD9F6A"/>
      <stop offset="100%" style="stop-color:#C17134"/>
    </linearGradient>
    <linearGradient id="ocreText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB888"/>
      <stop offset="100%" style="stop-color:#C17134"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#011f17"/>
  <rect width="800" height="450" fill="url(#bgGlow)" opacity="0.95"/>

  <!-- Corner ornaments -->
  <g stroke="url(#ocreGrad)" stroke-width="1.2" fill="none" opacity="0.85">
    <path d="M 36 36 L 96 36"/>
    <path d="M 36 36 L 36 96"/>
    <circle cx="36" cy="36" r="3" fill="#FD9F6A" stroke="none"/>
    <path d="M 764 36 L 704 36"/>
    <path d="M 764 36 L 764 96"/>
    <circle cx="764" cy="36" r="3" fill="#FD9F6A" stroke="none"/>
    <path d="M 36 414 L 96 414"/>
    <path d="M 36 414 L 36 354"/>
    <circle cx="36" cy="414" r="3" fill="#FD9F6A" stroke="none"/>
    <path d="M 764 414 L 704 414"/>
    <path d="M 764 414 L 764 354"/>
    <circle cx="764" cy="414" r="3" fill="#FD9F6A" stroke="none"/>
  </g>

  <!-- Inner border -->
  <rect x="56" y="56" width="688" height="338" fill="none" stroke="url(#ocreGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Eyebrow -->
  <text x="400" y="98" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#FD9F6A" text-anchor="middle" letter-spacing="4" font-weight="600">RECURSO GRATUITO · OFICIOS CIRCULARES</text>

  <!-- Divider with diamond -->
  <g transform="translate(400, 116)">
    <line x1="-90" y1="0" x2="-12" y2="0" stroke="url(#ocreGrad)" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="90" y2="0" stroke="url(#ocreGrad)" stroke-width="0.8"/>
    <path d="M 0 -5 L 6 0 L 0 5 L -6 0 Z" fill="#FD9F6A"/>
  </g>

  <!-- Wool spool icon (decorative, centered) -->
  <g transform="translate(400, 200)" opacity="0.92">
    <ellipse cx="0" cy="0" rx="42" ry="14" fill="none" stroke="#FD9F6A" stroke-width="1.2"/>
    <ellipse cx="0" cy="-10" rx="42" ry="14" fill="none" stroke="#FD9F6A" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="0" cy="10" rx="42" ry="14" fill="none" stroke="#FD9F6A" stroke-width="1.2" opacity="0.6"/>
    <line x1="-42" y1="0" x2="-42" y2="-1" stroke="#FD9F6A" stroke-width="0.6"/>
    <line x1="42" y1="0" x2="42" y2="1" stroke="#FD9F6A" stroke-width="0.6"/>
    <path d="M -8 -2 Q 0 -8 8 -2 Q 0 4 -8 -2 Z" fill="#FD9F6A" opacity="0.45"/>
  </g>

  <!-- Main title -->
  <text x="400" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="400" fill="#F4EFE3" text-anchor="middle">Directorio de</text>
  <text x="400" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="400" fill="#F4EFE3" text-anchor="middle">
    <tspan font-style="italic" fill="url(#ocreText)" font-weight="600">Lana Española</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="362" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#E8D5B7" text-anchor="middle">13 iniciativas con ficha, mapa y cascada de valor</text>

  <!-- Bottom ornament -->
  <g transform="translate(400, 392)">
    <line x1="-100" y1="0" x2="-18" y2="0" stroke="url(#ocreGrad)" stroke-width="0.6" opacity="0.7"/>
    <line x1="18" y1="0" x2="100" y2="0" stroke="url(#ocreGrad)" stroke-width="0.6" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#FD9F6A" stroke-width="1"/>
    <circle cx="0" cy="0" r="1.5" fill="#FD9F6A"/>
  </g>

  <!-- URL -->
  <text x="400" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#a89270" text-anchor="middle" letter-spacing="3">OFICIOSCIRCULARES.COM</text>
</svg>
